# =============================================================================
# AgentArk - local source build override
# =============================================================================
#
# Use this only when you intentionally want to build AgentArk from the current
# checkout instead of using the published GHCR image:
#
#   AGENTARK_IMAGE=agentark:dev docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# Keep AGENTARK_IMAGE set so AGENTARK_SELF_IMAGE also points at the local tag.
#
# =============================================================================

services:
  agentark-control:
    build:
      context: .
      args:
        AGENTARK_DOCKER_FEATURES: ${AGENTARK_DOCKER_FEATURES:-telegram,docker,ssh}
        AGENTARK_BUILD_JOBS: ${AGENTARK_BUILD_JOBS:-2}
        # Fast-rebuild profile for local dev: lto=off, codegen-units=16,
        # incremental=on, opt-level=1. The published GHCR image keeps using
        # the release profile (this override only applies to local builds
        # via `scripts\start.bat build`). Set AGENTARK_BUILD_PROFILE=release
        # in the environment to override and produce a release-optimized
        # local build.
        AGENTARK_BUILD_PROFILE: ${AGENTARK_BUILD_PROFILE:-dev-fast}
        INSTALL_PLAYWRIGHT_RUNTIME: ${AGENTARK_INSTALL_PLAYWRIGHT_RUNTIME:-true}
        INSTALL_TAILSCALE: ${AGENTARK_INSTALL_TAILSCALE:-true}
        INSTALL_CLOUDFLARED: ${AGENTARK_INSTALL_CLOUDFLARED:-true}
        INSTALL_LIGHTPANDA: ${AGENTARK_INSTALL_LIGHTPANDA:-true}
        INSTALL_GWS: ${AGENTARK_INSTALL_GWS:-true}
        INSTALL_DOCKER_CLI: ${AGENTARK_INSTALL_DOCKER_CLI:-true}
        INSTALL_WHATSAPP_BRIDGE: ${AGENTARK_INSTALL_WHATSAPP_BRIDGE:-true}
    image: ${AGENTARK_IMAGE:-agentark:dev}
    environment:
      RUST_LOG: ${AGENTARK_DEV_RUST_LOG:-warn,agentark=debug,agentark.turn_timing=debug,sqlx::query=warn,sea_orm=info,hyper=warn,reqwest=warn,bollard=info,tower=warn,h2=warn,rustls=warn}

  agentark-embeddings:
    image: ${AGENTARK_IMAGE:-agentark:dev}
    environment:
      RUST_LOG: ${AGENTARK_DEV_EMBEDDINGS_RUST_LOG:-warn,agentark=debug,agentark.turn_timing=debug,hyper=warn,reqwest=warn}

  agentark-executor:
    image: ${AGENTARK_IMAGE:-agentark:dev}
    environment:
      RUST_LOG: ${AGENTARK_DEV_RUST_LOG:-warn,agentark=debug,agentark.turn_timing=debug,sqlx::query=warn,sea_orm=info,hyper=warn,reqwest=warn,bollard=info,tower=warn,h2=warn,rustls=warn}

  agentark-workspace:
    image: ${AGENTARK_IMAGE:-agentark:dev}
    environment:
      RUST_LOG: ${AGENTARK_DEV_RUST_LOG:-warn,agentark=debug,agentark.turn_timing=debug,sqlx::query=warn,sea_orm=info,hyper=warn,reqwest=warn,bollard=info,tower=warn,h2=warn,rustls=warn}
